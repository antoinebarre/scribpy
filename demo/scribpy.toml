[project]
name = "scribpy-demo"

[paths]
source = "doc"

[document]
title = "Scribpy Demo Manual"

[document.toc]
enabled = true
max_level = 3
style = "bullet"

[document.numbering]
enabled = true
max_level = 3
style = "decimal"

[builders.html]
mode = "single-page"
css_files = ["theme/demo.css"]

[index]
mode = "explicit"
files = [
  "index.md",
  "guide/setup.md",
]
