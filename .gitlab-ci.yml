image: python:3.12-slim

stages:
  - check

# Avoid duplicate pipelines: run on MR events OR on branch pushes that have
# no open MR, but never both at the same time for the same commit.
workflow:
  rules:
    - if: $CI_MERGE_REQUEST_IID
    - if: $CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS
      when: never
    - if: $CI_COMMIT_BRANCH

variables:
  UV_CACHE_DIR: "$CI_PROJECT_DIR/.cache/uv"

cache:
  key: "$CI_COMMIT_REF_SLUG"
  paths:
    - .cache/uv

before_script:
  - apt-get update -qq && apt-get install -y -qq make
  - pip install uv --quiet
  - uv sync --group dev

check:
  stage: check
  script:
    - bash scripts/ci.sh
  artifacts:
    when: always
    paths:
      - work/*.log
      - work/*.xml
      - work/htmlcov/
    reports:
      junit: work/junit.xml
      coverage_report:
        coverage_format: cobertura
        path: work/coverage.xml
    expire_in: 1 week
  coverage: '/TOTAL\s+\d+\s+\d+\s+(\d+)%/'
