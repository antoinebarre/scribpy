[build-system]
requires = ["hatchling", "hatch-vcs"]
build-backend = "hatchling.build"

[project]
name = "scribpy"
dynamic = ["version"]
description = "Manipulate, edit, and generate documents from Markdown files."
readme = "README.md"
requires-python = ">=3.12"
license = "MIT"
license-files = ["LICENSE"]
authors = [{ name = "Antoine Barré" }]
keywords = ["docs-as-code", "documentation", "markdown", "static-site", "compiler"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Topic :: Documentation",
    "Topic :: Software Development :: Documentation",
    "Typing :: Typed",
]
dependencies = [
    "PyYAML>=6",
    "tomlkit>=0.13",
    "markdown-it-py>=3",
    "mkdocs>=1.6",
    "rich>=13",
    "typer>=0.16",
]

[project.urls]
Homepage = "https://github.com/antoinebarre/scribpy"
Repository = "https://github.com/antoinebarre/scribpy"
Issues = "https://github.com/antoinebarre/scribpy/issues"
Documentation = "https://github.com/antoinebarre/scribpy/blob/main/README.md"

[project.scripts]
scribpy = "scribpy.__main__:main"

[tool.hatch.build.targets.wheel]
packages = ["src/scribpy"]
include = ["src/scribpy/vendor/*.jar"]

[tool.hatch.version]
source = "vcs"
tag-pattern = "^v(?P<version>.+)$"
fallback-version = "0.0.0"

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--tb=short --cov=src/scribpy --cov-report=term-missing --cov-report=xml:work/coverage.xml --cov-report=html:work/htmlcov --junitxml=work/junit.xml"
pythonpath = ["src"]
cache_dir = "work/.pytest_cache"

[tool.coverage.run]
data_file = "work/.coverage"
source = ["src/scribpy"]
omit = [
    "src/scribpy/__init__.py",
    "src/scribpy/__main__.py",
    "src/scribpy/**/__init__.py",
]

[tool.coverage.report]
fail_under = 100
show_missing = true

[tool.coverage.html]
directory = "work/htmlcov"

[tool.coverage.xml]
output = "work/coverage.xml"

[tool.mypy]
strict = true
packages = ["scribpy"]
cache_dir = "work/.mypy_cache"

[tool.ruff]
cache-dir = "work/.ruff_cache"
line-length = 79
exclude = ["tests/"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "C901", "PLR0911", "PLR0912", "PLR0913", "PLR0915"]
# E501 is managed by the formatter (line-length = 79) for code;
# docstrings and comments are not reformatted and may legitimately exceed
# the limit slightly — exclude E501 to avoid false positives there.
ignore = ["E501"]

[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.ruff.lint.mccabe]
max-complexity = 10

[tool.ruff.lint.pylint]
max-args = 8
max-branches = 12
max-returns = 6
max-statements = 50

[tool.scribpy.code_metrics]
paths = ["src/scribpy"]
exclude = []
max_cyclomatic_complexity = 10
max_average_complexity = 4.0
min_maintainability_index = 44.0
max_module_logical_lines = 300
max_module_source_lines = 520
report_path = "work/code-metrics-report.md"

[tool.bandit]
exclude_dirs = ["tests", "work", "dist", "site"]
skips = [
    "B101",   # assert used in tests
    "B105",   # hardcoded_password_string: false positive on status icon strings
    "B404",   # import subprocess: used in report scripts for pip list introspection
    "B603",   # subprocess_without_shell: call uses fixed args, no user input
]

[tool.scribpy.security_audit]
# PYSEC-2026-89 affects Python-Markdown versions before 3.8.1; the lockfile
# currently resolves markdown to 3.10.2, so pip-audit's match is a false positive.
ignore_vulns = ["PYSEC-2026-89"]

[dependency-groups]
dev = [
    "bandit>=1.8",
    "pip-audit>=2.8",
    "pytest>=8",
    "pytest-cov>=6",
    "radon>=6",
    "ruff>=0.4",
    "mypy>=1.10",
    "types-pyyaml>=6.0.12.20260408",
]
