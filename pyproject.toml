[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "scribpy"
version = "0.1.0"
description = "Manipulate, edit, and generate documents from Markdown files."
readme = "README.md"
requires-python = ">=3.12"
license = { text = "MIT" }
authors = [{ name = "Antoine" }]
dependencies = []

[project.scripts]
scribpy = "scribpy.__main__:main"

[tool.hatch.build.targets.wheel]
packages = ["src/scribpy"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--tb=short --cov=scribpy --cov-report=term-missing --cov-report=xml:work/coverage.xml --cov-report=html:work/htmlcov --junitxml=work/junit.xml"
pythonpath = ["src"]
cache_dir = "work/.pytest_cache"

[tool.coverage.run]
data_file = "work/.coverage"

[tool.coverage.report]
fail_under = 80
show_missing = true

[tool.coverage.html]
directory = "work/htmlcov"

[tool.coverage.xml]
output = "work/coverage.xml"

[tool.mypy]
strict = true
packages = ["scribpy"]
cache_dir = "work/.mypy_cache"

[tool.ruff]
cache-dir = "work/.ruff_cache"

[tool.ruff.lint]
select = ["E", "F", "I", "UP"]

[dependency-groups]
dev = [
    "pytest>=8",
    "pytest-cov>=6",
    "ruff>=0.4",
    "mypy>=1.10",
]
