[flake8]
max-line-length = 79
docstring-convention = google
extend-ignore =
    # E501 managed by ruff format (line-length = 79)
    E501,
    # E203: whitespace before ':' in slices — ruff/Black style, not an error
    E203,
    # D100/D104: module/package docstrings not required (aligned with ruff config)
    D100,
    D104,
    # W503: line break before binary operator (conflicts with Black/ruff style)
    W503,
    # B008: function call in default argument — intentional in Typer CLI definitions
    B008,
    # B042: Exception __init__ not forwarding all args to super() — intentional pattern
    B042,
per-file-ignores =
    # __init__.py: no docstrings required on re-export facades
    src/scribpy/**/__init__.py:D
exclude =
    .git,
    work,
    dist,
    __pycache__,
    *.egg-info,
    .venv,
    build
