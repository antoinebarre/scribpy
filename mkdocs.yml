site_name: Scribpy
site_description: Assemble ordered Markdown collections into publishable outputs.
docs_dir: docs
theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
plugins:
  - search
markdown_extensions:
  - admonition
  - attr_list
  - tables
  - pymdownx.details
  - pymdownx.highlight
  - pymdownx.superfences
  - plantuml_markdown:
      server: https://www.plantuml.com/plantuml
      format: svg
nav:
  - Project scope: index.md
  - Getting started:
      - Installation: getting-started/installation.md
      - Core concepts: getting-started/concepts.md
      - First project: cli/demo.md
  - Architecture:
      - Overview: architecture/index.md
      - Domain model: architecture/domain-model.md
      - Assembly pipeline: architecture/assembly-pipeline.md
      - Diagram renderers: architecture/diagram-renderers.md
      - Diagnostics: architecture/diagnostics.md
  - Organizing a notes project:
      - Project structure: notes-project/index.md
      - Markdown sources: notes-project/markdown-sources.md
      - Links and images: notes-project/links-and-images.md
      - Root manifest: notes-project/root-manifest.md
      - Folder manifests and order: notes-project/folder-manifests.md
      - Diagram sources: notes-project/diagrams.md
  - Using the CLI:
      - Workflow: cli/index.md
      - Project creation: cli/project-creation.md
      - Validation and diagnostics: cli/validation.md
      - Build and export: cli/build-export.md
      - End-to-end demo: cli/demo.md
  - Using the Python API:
      - Workflow: python-api/index.md
      - End-user API: python-api/end-user.md
      - End-to-end demo: python-api/demo.md
      - Extension API: python-api/extensions.md
  - Guides:
      - Choosing an output: guides/outputs.md
      - Common recipes: guides/recipes.md
      - Troubleshooting: guides/troubleshooting.md
  - Reference:
      - CLI reference: reference/cli.md
      - Manifest reference: reference/manifests.md
      - Diagnostic reference: reference/diagnostics.md
      - Python API reference: reference/python-api.md
